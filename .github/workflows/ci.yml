name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Run directly on ubuntu-latest with Nix installed, using the same nixpkgs
# package set the Containerfile pins. This keeps CI identical to the local
# dev image without paying the container-build cost per job, and the
# magic-nix-cache keeps /nix/store warm across runs.

env:
  # Toolchain required by cmake build + ctest.
  BUILD_PKGS: nixpkgs#cmake nixpkgs#ninja nixpkgs#gcc14 nixpkgs#clang-tools nixpkgs#oatpp nixpkgs#nlohmann_json nixpkgs#pkg-config
  # Extra packages needed only by openapi-generator.
  APIGEN_PKGS: nixpkgs#openapi-generator-cli nixpkgs#jre_minimal nixpkgs#gnused

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Install toolchain
        run: nix profile install ${{ env.BUILD_PKGS }}
      - name: Configure
        run: cmake -B build -G Ninja
      - name: Build
        run: cmake --build build
      - name: Run ctest
        run: ctest --test-dir build --output-on-failure

  fmt:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Install clang-format
        run: nix profile install nixpkgs#clang-tools
      - name: Run clang-format
        run: |
          find src test bench \( -name "*.cc" -o -name "*.h" \) -print 2>/dev/null \
            | xargs -r clang-format -i
      - name: Verify no drift
        run: git diff --exit-code

  lint:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Install toolchain
        run: nix profile install ${{ env.BUILD_PKGS }}
      - name: Configure (generates compile_commands.json)
        run: cmake -B build -G Ninja
      - name: Run clang-tidy
        run: |
          find src -name "*.cc" \
               -not -path "*/third_party/*" -not -path "*/api-gen/*" -print \
            | xargs -r clang-tidy -p build --quiet

  api-gen-check:
    name: openapi codegen drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Install openapi-generator
        run: nix profile install ${{ env.APIGEN_PKGS }}
      - name: Regenerate src/api-gen
        run: |
          rm -rf src/api-gen
          openapi-generator-cli generate \
            -i docs/openapi.yaml \
            -g cpp-oatpp-server \
            -o src/api-gen \
            --additional-properties=packageName=oems_api
          rm -rf src/api-gen/impl \
                 src/api-gen/main-api-server.cpp \
                 src/api-gen/CMakeLists.txt \
                 src/api-gen/README.md
          sed -i \
              -e "s/const OrderStatus \&/const org::openapitools::server::model::OrderStatus \&/g" \
              -e "s/QUERY(OrderStatus,/QUERY(org::openapitools::server::model::OrderStatus,/g" \
              src/api-gen/api/OrdersApi.hpp
      - name: Verify committed api-gen is up to date
        run: git diff --exit-code src/api-gen
